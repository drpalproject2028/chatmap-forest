<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatMap Forest — CLAUDIUS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #faf9f6;
  --card: #ffffff;
  --text: #1c1917;
  --text2: #57534e;
  --text3: #a8a29e;
  --gold: #b8860b;
  --gold-light: rgba(184,134,11,0.08);
  --gold-mid: rgba(184,134,11,0.2);
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
  --shadow-hover: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.06);
  --era: #2563eb;
  --palcore: #b8860b;
  --cr1ar: #dc2626;
  --lux: #7c3aed;
  --drpal: #059669;
  --ativos: #d97706;
  --claudius: #0891b2;
  --explora: #78716c;
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

/* === HERO === */
.hero {
  padding:60px 48px 40px;
  position:relative;
  overflow:hidden;
}
.hero::after {
  content:'';
  position:absolute;
  top:-100px; right:-100px;
  width:500px; height:500px;
  background:radial-gradient(circle, var(--gold-light) 0%, transparent 70%);
  pointer-events:none;
}
.hero-eyebrow {
  font-size:0.7rem;
  font-weight:500;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:12px;
}
.hero h1 {
  font-family:'Fraunces',serif;
  font-size:3.2rem;
  font-weight:300;
  letter-spacing:-0.03em;
  line-height:1.1;
  color:var(--text);
}
.hero h1 em {
  font-style:italic;
  font-weight:300;
  color:var(--gold);
}
.hero-sub {
  font-size:0.95rem;
  color:var(--text2);
  margin-top:16px;
  line-height:1.6;
  max-width:600px;
}

/* === STATS === */
.stats-row {
  display:flex;
  gap:6px;
  padding:0 48px 32px;
  flex-wrap:wrap;
}
.stat-pill {
  display:flex;
  align-items:baseline;
  gap:6px;
  padding:10px 20px;
  background:var(--card);
  border-radius:100px;
  box-shadow:var(--shadow);
}
.stat-pill .num {
  font-family:'Fraunces',serif;
  font-size:1.5rem;
  font-weight:500;
  color:var(--gold);
}
.stat-pill .lbl {
  font-size:0.72rem;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:0.06em;
}

/* === FILTER BAR === */
.filter-bar {
  display:flex;
  align-items:center;
  gap:8px;
  padding:16px 48px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:50;
  background:var(--bg);
  border-bottom:1px solid rgba(0,0,0,0.04);
  backdrop-filter:blur(12px);
}
.filter-label {
  font-size:0.65rem;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:var(--text3);
  margin-right:8px;
}
.chip {
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 16px;
  border-radius:100px;
  border:1.5px solid rgba(0,0,0,0.08);
  background:transparent;
  font-family:'DM Sans',sans-serif;
  font-size:0.75rem;
  font-weight:500;
  color:var(--text2);
  cursor:pointer;
  transition:all 0.25s ease;
  user-select:none;
}
.chip:hover { border-color:rgba(0,0,0,0.15); }
.chip .cdot { width:8px; height:8px; border-radius:50%; transition:transform 0.2s; }
.chip.on { background:var(--card); box-shadow:var(--shadow); border-color:transparent; color:var(--text); }
.chip.on .cdot { transform:scale(1.3); }
.chip .ccount { color:var(--text3); font-weight:400; }

.view-tabs {
  margin-left:auto;
  display:flex;
  background:var(--card);
  border-radius:10px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.vtab {
  padding:8px 18px;
  font-family:'DM Sans',sans-serif;
  font-size:0.72rem;
  font-weight:500;
  border:none;
  background:transparent;
  color:var(--text3);
  cursor:pointer;
  transition:all 0.2s;
}
.vtab:hover { color:var(--text2); }
.vtab.active { background:var(--gold); color:#fff; }

/* === CANVAS FOREST === */
.canvas-wrap {
  padding:16px 48px 32px;
}
.canvas-container {
  position:relative;
  width:100%;
  height:520px;
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  cursor:default;
}
canvas { display:block; }
.canvas-tooltip {
  position:absolute;
  pointer-events:none;
  background:var(--text);
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  font-size:0.75rem;
  line-height:1.5;
  max-width:280px;
  opacity:0;
  transition:opacity 0.15s;
  z-index:10;
  box-shadow:0 8px 30px rgba(0,0,0,0.15);
}
.canvas-tooltip.show { opacity:1; }
.canvas-tooltip .tt-name { font-weight:600; margin-bottom:2px; }
.canvas-tooltip .tt-meta { color:rgba(255,255,255,0.6); font-size:0.65rem; }

/* === LIST VIEW === */
.list-section { padding:0 48px 40px; }
.list-group { margin-bottom:28px; }
.list-group-header {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  padding-bottom:8px;
  border-bottom:1.5px solid rgba(0,0,0,0.05);
}
.lg-dot { width:12px; height:12px; border-radius:50%; }
.lg-name { font-family:'Fraunces',serif; font-size:1.2rem; font-weight:500; }
.lg-stats { margin-left:auto; font-size:0.7rem; color:var(--text3); }
.list-item {
  display:flex;
  align-items:center;
  gap:14px;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  transition:all 0.2s;
}
.list-item:hover { background:rgba(0,0,0,0.02); }
.li-bar { height:4px; border-radius:2px; min-width:4px; flex-shrink:0; }
.li-name { flex:1; font-size:0.82rem; color:var(--text); line-height:1.4; }
.li-date { font-size:0.7rem; color:var(--text3); min-width:72px; flex-shrink:0; }
.li-msgs { font-size:0.7rem; color:var(--text2); min-width:56px; text-align:right; flex-shrink:0; }
.li-msgs strong { color:var(--gold); font-weight:600; }

/* === TIMELINE VIEW === */
.timeline-view { padding:0 48px 40px; }
.tl-day { margin-bottom:20px; }
.tl-day-label {
  font-family:'Fraunces',serif;
  font-size:0.95rem;
  font-weight:500;
  color:var(--text2);
  margin-bottom:8px;
  padding-left:16px;
  border-left:3px solid var(--gold-mid);
}

/* === DETAIL MODAL === */
.modal-bg {
  position:fixed; inset:0;
  background:rgba(28,25,23,0.25);
  backdrop-filter:blur(8px);
  z-index:200;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.modal-bg.open { display:flex; }
.modal {
  background:var(--card);
  border-radius:20px;
  max-width:480px;
  width:100%;
  padding:36px;
  box-shadow:0 24px 80px rgba(0,0,0,0.12);
  position:relative;
  animation:modalIn 0.25s ease;
}
@keyframes modalIn { from { opacity:0; transform:translateY(12px) scale(0.97); } }
.modal-close {
  position:absolute; top:16px; right:20px;
  background:none; border:none; font-size:1.4rem;
  color:var(--text3); cursor:pointer; line-height:1;
}
.modal-close:hover { color:var(--text); }
.modal-tag {
  display:inline-block;
  padding:4px 14px;
  border-radius:100px;
  font-size:0.65rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin-bottom:16px;
}
.modal-title {
  font-family:'Fraunces',serif;
  font-size:1.6rem;
  font-weight:500;
  line-height:1.25;
  margin-bottom:20px;
}
.modal-stats {
  display:flex;
  gap:28px;
  padding-bottom:20px;
  border-bottom:1px solid rgba(0,0,0,0.06);
  margin-bottom:20px;
}
.ms-item .ms-val { font-family:'Fraunces',serif; font-size:1.3rem; color:var(--gold); font-weight:500; }
.ms-item .ms-lbl { font-size:0.6rem; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; margin-top:2px; }
.gravity-wrap { margin-top:4px; }
.gravity-bar { height:8px; background:rgba(0,0,0,0.04); border-radius:4px; overflow:hidden; }
.gravity-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }
.gravity-label { font-size:0.65rem; color:var(--text3); margin-top:6px; }

/* === FOOTER === */
.footer {
  padding:32px 48px;
  border-top:1px solid rgba(0,0,0,0.05);
  display:flex;
  justify-content:space-between;
  font-size:0.65rem;
  color:var(--text3);
}

@media(max-width:768px) {
  .hero, .stats-row, .filter-bar, .canvas-wrap, .list-section, .timeline-view, .footer { padding-left:20px; padding-right:20px; }
  .hero h1 { font-size:2rem; }
  .canvas-container { height:400px; }
}
</style>
</head>

function renderFilters() {

function getF() { return DATA.filter(t=>active.has(t.b)); }

function renderCurrent() {
  document.getElementById('canvas-section').style.display = view==='forest'?'':'none';
  document.getElementById('list-section').style.display = view==='list'?'':'none';
  document.getElementById('timeline-section').style.display = view==='time'?'':'none';
  if(view==='forest') initCanvas();
  else if(view==='list') renderList();
  else renderTime();
}

// === BUBBLE CANVAS ===
function initCanvas() {
  const container = document.getElementById('canvas-container');
  const canvas = document.getElementById('forest-canvas');
  const W = container.clientWidth;
  const H = container.clientHeight;
  canvas.width = W * 2; canvas.height = H * 2;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';

  const filtered = getF();
  const minR = 8, maxR = 65;
  bubbles = filtered.map((t,i) => {
    const r = minR + (t.m/maxM) * (maxR-minR);
    return {
      x: Math.random()*W*0.8 + W*0.1,
      y: Math.random()*H*0.8 + H*0.1,
      r, vx:0, vy:0,
      tx: Math.random()*W*0.8 + W*0.1,
      ty: Math.random()*H*0.8 + H*0.1,
      color: COLORS[t.b],
      data: t, idx: DATA.indexOf(t)
    };
  });

  if(animFrame) cancelAnimationFrame(animFrame);
  simulate(canvas, W, H);

  // Mouse
  const tooltip = document.getElementById('tooltip');
  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    let found = -1;
    for(let i=bubbles.length-1;i>=0;i--) {
      const b=bubbles[i];
      const dx=mx-b.x, dy=my-b.y;
      if(dx*dx+dy*dy < b.r*b.r) { found=i; break; }
    }
    hovered = found;
    canvas.style.cursor = found>=0 ? 'pointer' : 'default';
    if(found>=0) {
      const b=bubbles[found];
      tooltip.innerHTML = `<div class="tt-name">${b.data.n}</div><div class="tt-meta">${b.data.d} · ${b.data.m} mensagens · ${b.data.b}</div>`;
      tooltip.classList.add('show');
      let tx = b.x + b.r + 12;
      let ty = b.y - 20;
      if(tx+260>W) tx = b.x-b.r-270;
      if(ty<10) ty=10;
      tooltip.style.left = tx+'px';
      tooltip.style.top = ty+'px';
    } else {
      tooltip.classList.remove('show');
    }
  };
  canvas.onmouseleave = () => { hovered=-1; tooltip.classList.remove('show'); };
  canvas.onclick = () => { if(hovered>=0) showModal(bubbles[hovered].idx); };
}

function simulate(canvas, W, H) {
  const ctx = canvas.getContext('2d');
  const dpr = 2;

  function tick() {
    // Soft collision
    for(let i=0;i<bubbles.length;i++) {
      for(let j=i+1;j<bubbles.length;j++) {
        const a=bubbles[i], b=bubbles[j];
        const dx=b.x-a.x, dy=b.y-a.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const minDist=a.r+b.r+3;
        if(dist<minDist && dist>0) {
          const f=(minDist-dist)/dist*0.03;
          const fx=dx*f, fy=dy*f;
          a.x-=fx; a.y-=fy;
          b.x+=fx; b.y+=fy;
        }
      }
    }
    // Keep in bounds
    bubbles.forEach(b => {
      if(b.x-b.r<10) b.x=b.r+10;
      if(b.x+b.r>W-10) b.x=W-b.r-10;
      if(b.y-b.r<10) b.y=b.r+10;
      if(b.y+b.r>H-10) b.y=H-b.r-10;
    });

    // Draw
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.scale(dpr,dpr);

    // Sort so bigger behind
    const sorted = [...bubbles].sort((a,b)=>b.r-a.r);
    sorted.forEach((b,i) => {
      const isH = bubbles.indexOf(b)===hovered;
      // Glow
      if(isH) {
        ctx.beginPath();
        const grd = ctx.createRadialGradient(b.x,b.y,b.r*0.5,b.x,b.y,b.r*2);
        grd.addColorStop(0, b.color+'30');
        grd.addColorStop(1, b.color+'00');
        ctx.fillStyle = grd;
        ctx.arc(b.x,b.y,b.r*2,0,Math.PI*2);
        ctx.fill();
      }
      // Circle
      ctx.beginPath();
      ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle = isH ? b.color+'ee' : b.color+'55';
      ctx.fill();
      ctx.strokeStyle = isH ? b.color : b.color+'40';
      ctx.lineWidth = isH ? 2.5 : 1;
      ctx.stroke();
      // Label for big bubbles
      if(b.r>28) {
        ctx.fillStyle = isH ? '#fff' : '#ffffffcc';
        ctx.font = `${Math.min(b.r*0.28,13)}px "DM Sans"`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const words = b.data.n.split(' ');
        let line='', lines=[], maxW=b.r*1.5;
        words.forEach(w=>{
          if(ctx.measureText(line+' '+w).width>maxW && line) { lines.push(line); line=w; }
          else line = line ? line+' '+w : w;
        });
        if(line) lines.push(line);
        lines = lines.slice(0,3);
        const lh = Math.min(b.r*0.32,15);
        const startY = b.y - (lines.length-1)*lh/2;
        lines.forEach((l,li)=>ctx.fillText(l,b.x,startY+li*lh));
      }
    });

    ctx.restore();
    animFrame = requestAnimationFrame(tick);
  }
  tick();
}

// === LIST VIEW ===
function renderList() {
  const filtered = getF();
  let h = '';
  BORD.forEach(b => {
    if(!active.has(b)) return;
    const trees = filtered.filter(t=>t.b===b).sort((a,b2)=>b2.m-a.m);
    if(!trees.length) return;
    const tm = trees.reduce((a,t)=>a+t.m,0);
    h += `<div class="list-group">
      <div class="list-group-header">
        <div class="lg-dot" style="background:${COLORS[b]}"></div>
        <div class="lg-name">${b}</div>
        <div class="lg-stats">${trees.length} conversas · ${tm} msgs</div>
      </div>`;
    trees.forEach(t => {
      const w = Math.max(4,Math.round((t.m/maxM)*180));
      const idx = DATA.indexOf(t);
      h += `<div class="list-item" onclick="showModal(${idx})">
        <div class="li-bar" style="width:${w}px;background:${COLORS[b]}"></div>
        <div class="li-name">${t.n}</div>
        <div class="li-date">${t.d}</div>
        <div class="li-msgs"><strong>${t.m}</strong> msgs</div>
      </div>`;
    });
    h += '</div>';
  });
  document.getElementById('list-section').innerHTML = h;
}

// === TIMELINE VIEW ===
function renderTime() {
  const filtered = getF().sort((a,b)=>a.d.localeCompare(b.d));
  let h = '', cd = '';
  filtered.forEach(t => {
    if(t.d!==cd) {
      if(cd) h+='</div>';
      cd=t.d;
      const dn = new Date(t.d+'T12:00').toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'});
      h+=`<div class="tl-day"><div class="tl-day-label">${dn}</div>`;
    }
    const idx=DATA.indexOf(t);
    const w=Math.max(4,Math.round((t.m/maxM)*180));
    h+=`<div class="list-item" onclick="showModal(${idx})">
      <div class="li-bar" style="width:${w}px;background:${COLORS[t.b]}"></div>
      <div class="li-name">${t.n}</div>
      <div class="li-msgs" style="color:${COLORS[t.b]}">${t.b}</div>
      <div class="li-msgs"><strong>${t.m}</strong></div>
    </div>`;
  });
  if(cd) h+='</div>';
  document.getElementById('timeline-section').innerHTML=h;
}

// === MODAL ===
function showModal(idx) {
  const t=DATA[idx];
  const grav=Math.round((t.m/maxM)*100);
  const c=COLORS[t.b];
  document.getElementById('modal').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-tag" style="background:${c}15;color:${c}">${t.b}</div>
    <div class="modal-title">${t.n}</div>
    <div class="modal-stats">
      <div class="ms-item"><div class="ms-val">${t.d}</div><div class="ms-lbl">Data</div></div>
      <div class="ms-item"><div class="ms-val">${t.m}</div><div class="ms-lbl">Mensagens</div></div>
      <div class="ms-item"><div class="ms-val">#${idx+1}</div><div class="ms-lbl">Ordem</div></div>
    </div>
    <div class="gravity-wrap">
      <div class="gravity-bar"><div class="gravity-fill" style="width:${grav}%;background:${c}"></div></div>
      <div class="gravity-label">Gravidade ${grav}% – peso relativo na floresta</div>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target.id==='modal-bg')closeModal();});

// Init
renderFilters();
renderCurrent();
window.addEventListener('resize',()=>{if(view==='forest')initCanvas();});
</script>
